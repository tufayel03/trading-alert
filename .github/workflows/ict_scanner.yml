name: ICT Discord Alert Bot Scanner

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes automatically
  workflow_dispatch:        # Allows manual run from GitHub UI

jobs:
  scan_and_alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ICT Scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python ict_bot.py

      - name: Commit Updated State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add alert_state.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "update alert state" && git push)
